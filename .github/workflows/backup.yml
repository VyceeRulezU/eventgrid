name: Database Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export all tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          TABLES="events guests profiles vendors event_vendors seating_tables client_payments tasks feedbacks notifications phases"
          mkdir -p backup
          for table in $TABLES; do
            echo "Exporting $table..."
            curl -s "$SUPABASE_URL/rest/v1/$table" \
              -H "apikey: $SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
              -H "Accept: application/json" \
              -o "backup/${table}.json"
          done

      - name: Create archive
        run: tar -czf backup.tar.gz backup/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: backup.tar.gz
          retention-days: 30
