name: Database Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export all tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::SUPABASE_URL secret is not set in the repository. Please go to Settings > Secrets and variables > Actions to configure it."
            exit 1
          fi
          if [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set in the repository. Please go to Settings > Secrets and variables > Actions to configure it."
            exit 1
          fi

          TABLES="events guests profiles vendors event_vendors seating_tables client_payments tasks feedback notifications event_phases"
          mkdir -p backup
          for table in $TABLES; do
            echo "Exporting $table..."
            curl -s --fail "$SUPABASE_URL/rest/v1/$table" \
              -H "apikey: $SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
              -H "Accept: application/json" \
              -o "backup/${table}.json" || { echo "::error::Failed to export $table (HTTP/Connection error)"; exit 1; }
          done

      - name: Create archive
        run: tar -czf backup.tar.gz backup/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: backup.tar.gz
          retention-days: 30
