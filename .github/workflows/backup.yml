name: Database Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
        run: |
          PROJECT_REF=$(echo "$SUPABASE_URL" | sed -E 's|https?://([^.]+)\..*|\1|')
          pg_dump \
            --dbname="postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.${PROJECT_REF}.supabase.co:5432/postgres" \
            --no-owner \
            -f backup.sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: backup.sql
          retention-days: 30
