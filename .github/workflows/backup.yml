name: Database Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Dump database
        run: |
          IPV4=$(getent ahosts "db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co" | grep STREAM | head -1 | awk '{print $1}')
          if [ -z "$IPV4" ]; then
            echo "Could not resolve IPv4 address"
            exit 1
          fi
          pg_dump \
            --dbname="postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@${IPV4}:5432/postgres?sslmode=require" \
            --no-owner \
            -f backup.sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}-${{ github.run_attempt }}
          path: backup.sql
          retention-days: 30
