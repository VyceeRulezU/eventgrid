name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::SUPABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set"
            exit 1
          fi

          curl -s --fail "$SUPABASE_URL/rest/v1/profiles?select=count&head=true" \
            -H "apikey: $SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Accept: application/json" \
            -o /dev/null -w "HTTP %{http_code}\n" || {
              echo "::error::Keep-alive ping failed"
              exit 1
            }
          echo "Keep-alive successful"
